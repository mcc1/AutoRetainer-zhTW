name: Auto Localize AutoRetainer

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:    

jobs:
  build-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    env:
      DALAMUD_VERSION: 25-12-08-01

    steps:
      - name: Checkout Localizer
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整歷史紀錄

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Clone Original Repo
        run: |
          rm -rf AutoRetainer
          git clone --recurse-submodules https://github.com/PunishXIV/AutoRetainer.git AutoRetainer
          rm -rf AutoRetainer/.git

      - name: Run Translation
        env:
          TRANSLATION_API_KEY: ${{ secrets.TRANSLATION_API_KEY }}
        run: |
          dotnet run --project AutoRetainerLocalizer.csproj

      - name: Prepare Dalamud Dependencies
        run: |
          mkdir -p "$RUNNER_TEMP/dalamud"
          api_url="https://api.github.com/repos/yanmucorp/Dalamud/releases/tags/${DALAMUD_VERSION}"
          if ! release_json="$(curl -fsSL -H "Accept: application/vnd.github+json" "$api_url")"; then
            api_url="https://api.github.com/repos/yanmucorp/Dalamud/releases/tags/v${DALAMUD_VERSION}"
            release_json="$(curl -fsSL -H "Accept: application/vnd.github+json" "$api_url")"
          fi

          asset_url="$(
            printf '%s' "$release_json" \
              | grep -oE '"browser_download_url":[[:space:]]*"[^"]+\.zip"' \
              | cut -d '"' -f 4 \
              | grep -Ei 'latest|dalamud' \
              | head -n 1
          )"

          if [ -z "$asset_url" ]; then
            asset_url="$(
              printf '%s' "$release_json" \
                | grep -oE '"browser_download_url":[[:space:]]*"[^"]+\.zip"' \
                | cut -d '"' -f 4 \
                | head -n 1
            )"
          fi

          if [ -z "$asset_url" ]; then
            echo "No .zip asset found for yanmucorp/Dalamud tag: ${DALAMUD_VERSION}"
            exit 1
          fi

          curl -fL --retry 3 "$asset_url" -o "$RUNNER_TEMP/dalamud/dalamud.zip"
          unzip -q -o "$RUNNER_TEMP/dalamud/dalamud.zip" -d "$RUNNER_TEMP/dalamud"
          echo "DALAMUD_HOME=$RUNNER_TEMP/dalamud/" >> "$GITHUB_ENV"

      - name: Build AutoRetainer (Release)
        env:
          CI: true
        run: |
          dotnet build AutoRetainer/AutoRetainer/AutoRetainer.csproj -c Release -p:CustomCS=true -p:EnableWindowsTargeting=true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoRetainer-build-${{ github.run_number }}
          path: |
            AutoRetainer/AutoRetainer/bin/Release/**/*.dll
            AutoRetainer/AutoRetainer/bin/Release/**/*.json
            AutoRetainer/AutoRetainer/bin/Release/**/*.pdb
            AutoRetainer/AutoRetainer/bin/Release/**/*.png
          if-no-files-found: error

      - name: Commit and Push
        run: |
          git rm -r --cached AutoRetainer || true
          rm -rf AutoRetainer/.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-translate: Sync and processed source code"
            git push
          else
            echo "No changes to commit"
          fi
