name: Auto Localize AutoRetainer

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:
    inputs:
      workflow_mode:
        description: Shared workflow mode
        required: true
        default: build
        type: choice
        options:
          - extract
          - build
          - sync
      publish_release:
        description: Publish a GitHub Release asset
        required: true
        default: false
        type: boolean
      publish_dev_release:
        description: Update the fixed dev prerelease asset
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  autoretainer:
    uses: mcc1/dalamud-mod-localizer/.github/workflows/reusable-build-mod.yml@main
    secrets: inherit
    with:
      mod_name: AutoRetainer
      workflow_mode: ${{ github.event_name == 'schedule' && 'build' || inputs.workflow_mode }}
      mod_version: "4.5.1.13"
      mod_repo_url: https://github.com/PunishXIV/AutoRetainer.git
      mod_ref: 4f658f35a89341f78d5de412482dd7183824cb90
      mod_repo_dir: AutoRetainer
      localizer_source_subpaths: AutoRetainer
      localizer_dict_path: zh-TW.json
      build_project_path: AutoRetainer/AutoRetainer/AutoRetainer.csproj
      package_build_dir: AutoRetainer/AutoRetainer/bin/Release
      artifact_basename: AutoRetainer
      release_tag_prefix: autoretainer-v
      package_include_patterns: |
        *.dll
        *.json
        *.pdb
        res/*.png
      dalamud_asset_url: https://github.com/yanmucorp/Dalamud/releases/download/25-12-26-01/latest.7z
      dalamud_assets_json_url: https://raw.githubusercontent.com/yanmucorp/DalamudAssets/master/assetCN.json
      dalamud_required_files: |
        Dalamud.dll
        Dalamud.Common.dll
        ImGui.NET.dll
        Lumina.dll
        Lumina.Excel.dll
        ImGuiScene.dll
        InteropGenerator.Runtime.dll
        FFXIVClientStructs.dll
      translation_smoke_test_patterns: |
        開啟插件介面
        雇員名稱
        飛空艇零件的物品 ID 為 0
        解鎖方案
        無法取得飛空艇索引
      commit_changes: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_mode == 'sync' }}
      publish_release: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}

  publish-dev:
    name: Publish Fixed Dev Prerelease
    needs: autoretainer
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.publish_dev_release && inputs.workflow_mode != 'extract') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEV_TAG: autoretainer-dev
      DEV_TITLE: AutoRetainer-zhTW dev
      DEV_NOTES: Latest automated dev build for in-game testing install.
      ARTIFACT_NAME: AutoRetainer-4.5.1.13-4f658f35
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist

      - name: Prepare Dev Package
        run: |
          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          def to_dev_version(version: str) -> str:
              parts = version.split(".")
              if len(parts) != 4 or not all(part.isdigit() for part in parts):
                  raise SystemExit(f"Unsupported base version format for dev packaging: {version}")
              parts[-1] = f"{parts[-1]}01"
              return ".".join(parts)

          zip_path = next(Path("dist").glob("*.zip"))
          temp_dir = Path("dist/unpacked")
          temp_dir.mkdir(parents=True, exist_ok=True)

          with zipfile.ZipFile(zip_path) as zf:
              zf.extractall(temp_dir)

          for manifest_path in [
              temp_dir / "AutoRetainer.json",
              temp_dir / "AutoRetainer" / "AutoRetainer.json",
          ]:
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              manifest["AssemblyVersion"] = to_dev_version(manifest["AssemblyVersion"])
              manifest["Changelog"] = (
                  "Dev testing channel. This prerelease tag is continuously updated "
                  "by automation with the latest AutoRetainer-zhTW build."
              )
              manifest_path.write_text(
                  json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          dev_zip = Path("dist") / "AutoRetainer-dev.zip"
          with zipfile.ZipFile(dev_zip, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(temp_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(temp_dir).as_posix())
          PY

      - name: Create or Update Fixed Dev Prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$DEV_TAG" >/dev/null 2>&1; then
            gh release upload "$DEV_TAG" dist/AutoRetainer-dev.zip --clobber
            gh release edit "$DEV_TAG" --prerelease --title "$DEV_TITLE" --notes "$DEV_NOTES"
          else
            gh release create "$DEV_TAG" dist/AutoRetainer-dev.zip --prerelease --title "$DEV_TITLE" --notes "$DEV_NOTES"
          fi
