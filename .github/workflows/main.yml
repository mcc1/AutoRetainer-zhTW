name: Auto Localize AutoRetainer

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:    

jobs:
  build-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Localizer
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整歷史紀錄

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Clone Original Repo
        run: |
          rm -rf AutoRetainer
          git clone --recurse-submodules https://github.com/PunishXIV/AutoRetainer.git AutoRetainer
          rm -rf AutoRetainer/.git

      - name: Run Translation
        env:
          TRANSLATION_API_KEY: ${{ secrets.TRANSLATION_API_KEY }}
        run: |
          dotnet run --project AutoRetainerLocalizer.csproj

      - name: Build AutoRetainer (Release)
        env:
          CI: true
        run: |
          dotnet build AutoRetainer/AutoRetainer/AutoRetainer.csproj -c Release -p:CustomCS=true -p:EnableWindowsTargeting=true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoRetainer-build-${{ github.run_number }}
          path: |
            AutoRetainer/AutoRetainer/bin/Release/**/*.dll
            AutoRetainer/AutoRetainer/bin/Release/**/*.json
            AutoRetainer/AutoRetainer/bin/Release/**/*.pdb
            AutoRetainer/AutoRetainer/bin/Release/**/*.png
          if-no-files-found: error

      - name: Commit and Push
        run: |
          git rm -r --cached AutoRetainer || true
          rm -rf AutoRetainer/.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-translate: Sync and processed source code"
            git push
          else
            echo "No changes to commit"
          fi
